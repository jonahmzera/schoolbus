<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>

body {
    margin: 0;
    font-family: Segoe UI, sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
}

.login-container {
    background: #1f2a38;
    padding: 40px;
    border-radius: 14px;
    border-left: 6px solid #22c1c3;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    max-width: 400px;
    width: 90%;
}

.login-container h1 {
    text-align: center;
    margin-top: 0;
    color: #22c1c3;
}

.login-container p {
    text-align: center;
    color: #b0bec5;
    margin-bottom: 30px;
}

.form-group {
    margin-bottom: 20px;
}

.form-group label {
    display: block;
    margin-bottom: 8px;
    color: #b0bec5;
    font-size: 14px;
}

.form-group select,
.form-group input {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    font-size: 16px;
    box-sizing: border-box;
    background: #0f2027;
    color: white;
}

.form-group select option {
    background: #0f2027;
    color: white;
}

.form-group input::placeholder {
    color: #7f8c8d;
}

.login-btn {
    width: 100%;
    padding: 12px;
    background: #22c1c3;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
    margin-top: 10px;
}

.login-btn:hover {
    background: #1ba0a0;
}

.modal-content {
    background: #1f2a38;
    border-radius: 14px;
    padding: 30px;
    border-left: 6px solid #22c1c3;
}

.modal-content h2 {
    margin-top: 0;
    color: #22c1c3;
}

.error-message {
    color: #e74c3c;
    text-align: center;
    margin-top: 15px;
    display: none;
}

/* ADMIN DASHBOARD STYLES */
.admin-container {
    width: 95%;
    max-width: 1200px;
    margin: auto;
    padding: 20px;
}

.admin-header {
    text-align: center;
    margin-bottom: 40px;
}

.admin-header h1 {
    margin: 0 0 10px 0;
}

.admin-header p {
    color: #b0bec5;
    margin: 0;
}

.campus-section {
    background: #1f2a38;
    padding: 30px;
    border-radius: 14px;
    border-left: 6px solid #22c1c3;
    margin-bottom: 30px;
}

.campus-section h2 {
    margin-top: 0;
    color: #22c1c3;
    display: flex;
    align-items: center;
    gap: 10px;
}

.bus-list {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
    margin-top: 20px;
}

.bus-card {
    background: #0f2027;
    padding: 20px;
    border-radius: 10px;
    border-left: 4px solid #22c1c3;
}

.bus-card h3 {
    margin: 0 0 15px 0;
    color: white;
}

.bus-info {
    margin-bottom: 15px;
    font-size: 14px;
}

.bus-info p {
    margin: 8px 0;
    color: #b0bec5;
}

.bus-info strong {
    color: #22c1c3;
}

.bus-status {
    padding: 8px 12px;
    border-radius: 6px;
    display: inline-block;
    font-size: 12px;
    font-weight: bold;
    margin: 10px 0;
}

.status-available {
    background: #2ecc71;
    color: white;
}

.status-departed {
    background: #e74c3c;
    color: white;
}

.bus-actions {
    display: flex;
    gap: 10px;
    margin-top: 15px;
}

.bus-btn {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    font-weight: bold;
    transition: 0.2s;
}

.btn-toggle {
    background: #22c1c3;
    color: white;
}

.btn-toggle:hover {
    background: #1ba0a0;
}

.btn-logout {
    background: #e74c3c;
    color: white;
    margin-top: 30px;
    padding: 12px;
    width: 100%;
}

.btn-logout:hover {
    background: #c0392b;
}

.hidden {
    display: none !important;
}

@media (max-width: 768px) {
    .bus-list {
        grid-template-columns: 1fr;
    }
    
    .admin-container {
        padding: 10px;
    }
}

</style>

</head>

<body>

<!-- LOGIN SECTION -->
<div class="login-container" id="loginSection">
    <h1>Admin Login</h1>
    <p>Access your bus management dashboard</p>
    
    <div class="form-group">
        <label for="campus">Select Campus</label>
        <select id="campus">
            <option value="">-- Choose Campus --</option>
            <option value="athi">Athi River Campus</option>
            <option value="nairobi">Nairobi Campus</option>
        </select>
    </div>
    
    <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter admin password">
    </div>
    
    <button class="login-btn" onclick="adminLogin()">Login</button>
    
    <div class="error-message" id="errorMsg"></div>
</div>

<!-- ADMIN DASHBOARD SECTION -->
<div class="admin-container hidden" id="dashboardSection">
    <div class="admin-header">
        <h1>Bus Management Dashboard</h1>
        <p id="adminTitle"></p>
    </div>
    
    <!-- ATHI RIVER CAMPUS BUSES -->
    <div class="campus-section" id="athiSection" style="display:none;">
        <h2>🚌 Athi River Campus Buses</h2>
        <div class="bus-list" id="athiBuses"></div>
    </div>
    
    <!-- NAIROBI CAMPUS BUSES -->
    <div class="campus-section" id="nairoiSection" style="display:none;">
        <h2>🚌 Nairobi Campus Buses</h2>
        <div class="bus-list" id="nairoiBuses"></div>
    </div>
    
    <button class="bus-btn btn-logout" onclick="adminLogout()">Logout</button>
</div>

<!-- SCHEDULE MODAL -->
<div class="modal-overlay" id="scheduleModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:2000; flex-direction:column; align-items:center; justify-content:center;">
    <div class="modal-content" style="background:#1f2a38; border-radius:14px; padding:30px; max-width:500px; width:90%; border-left:6px solid #22c1c3;">
        <h2 style="margin-top:0; color:#22c1c3;">Schedule Bus</h2>
        
        <div class="form-group">
            <label>Bus Plate</label>
            <input type="text" id="scheduleBusPlate" disabled style="background:#0f2027; color:#b0bec5; cursor:not-allowed;">
        </div>
        
        <div class="form-group">
            <label for="scheduleDay">Select Day</label>
            <select id="scheduleDay" onchange="updateScheduleTimes()">
                <option value="">-- Choose Day --</option>
                <option value="monday">Monday</option>
                <option value="tuesday">Tuesday</option>
                <option value="wednesday">Wednesday</option>
                <option value="thursday">Thursday</option>
                <option value="friday">Friday</option>
                <option value="saturday">Saturday</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="scheduleTime">Departure Time</label>
            <select id="scheduleTime">
                <option value="">-- Choose Time --</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="scheduleStatus">Bus Status</label>
            <select id="scheduleStatus">
                <option value="available">Available (Ready to Depart)</option>
                <option value="departed">Departed (Left)</option>
            </select>
        </div>
        
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button class="bus-btn btn-toggle" onclick="saveSchedule()" style="flex:1;">Save Schedule</button>
            <button class="bus-btn btn-logout" onclick="closeScheduleModal()" style="flex:1; background:#2c3e50; margin-top:0;">Cancel</button>
        </div>
    </div>
</div>

<script>

// Bus data organized by campus
const busesData = {
    athi: [
        { plate: "KDA347R", type: "new", seats: 45, status: "available", destination: "Sokimau/Nairobi" },
        { plate: "KDC234K", type: "new", seats: 45, status: "available", destination: "Sokimau/Nairobi" },
        { plate: "KCU978S", type: "old", seats: 29, status: "available", destination: "Sokimau/Nairobi" },
        { plate: "KBX319D", type: "old", seats: 29, status: "departed", destination: "Sokimau/Nairobi" }
    ],
    nairobi: [
        { plate: "KDE456K", type: "new", seats: 45, status: "available", destination: "Sokimau/Athi" },
        { plate: "KCY564K", type: "new", seats: 45, status: "available", destination: "Sokimau/Athi" },
        { plate: "KBX514D", type: "old", seats: 29, status: "available", destination: "Sokimau/Athi" },
        { plate: "KCU453E", type: "old", seats: 29, status: "available", destination: "Sokimau/Athi" }
    ]
};

const ADMIN_PASSWORD = "admin_8457";

// Predefined bus schedule by day
const BUS_SCHEDULE = {
    monday: ["08:00", "16:00", "17:00"],
    tuesday: ["08:00", "13:00", "16:00", "17:00"],
    wednesday: ["08:00", "16:00", "17:00"],
    thursday: ["08:00", "16:00", "17:00"],
    friday: ["08:00", "16:00", "17:00"],
    saturday: ["10:00"],
    sunday: []
};

let currentAdmin = null;
let editingBusIdx = null;

// Helper to convert 24h to 12h format
function convertTo12h(time24) {
    const [hours, minutes] = time24.split(":");
    const h = parseInt(hours);
    const ampm = h >= 12 ? "pm" : "am";
    const h12 = h % 12 || 12;
    return `${h12}:${minutes}${ampm}`;
}

function adminLogin() {
    const campus = document.getElementById("campus").value;
    const password = document.getElementById("password").value;
    const errorMsg = document.getElementById("errorMsg");

    if (!campus) {
        errorMsg.textContent = "Please select a campus.";
        errorMsg.style.display = "block";
        return;
    }

    if (!password) {
        errorMsg.textContent = "Please enter a password.";
        errorMsg.style.display = "block";
        return;
    }

    if (password !== ADMIN_PASSWORD) {
        errorMsg.textContent = "Invalid password. Access denied.";
        errorMsg.style.display = "block";
        return;
    }

    // Successful login
    currentAdmin = campus;
    localStorage.setItem("adminCampus", campus);
    showDashboard();
}

function showDashboard() {
    document.getElementById("loginSection").classList.add("hidden");
    document.getElementById("dashboardSection").classList.remove("hidden");

    const campusName = currentAdmin === "athi" ? "Athi River" : "Nairobi";
    document.getElementById("adminTitle").textContent = `${campusName} Campus - Bus Management`;

    // Show appropriate campus section
    if (currentAdmin === "athi") {
        document.getElementById("athiSection").style.display = "block";
        document.getElementById("nairoiSection").style.display = "none";
        renderBusList("athi", document.getElementById("athiBuses"));
    } else {
        document.getElementById("athiSection").style.display = "none";
        document.getElementById("nairoiSection").style.display = "block";
        renderBusList("nairobi", document.getElementById("nairoiBuses"));
    }
}

function renderBusList(campus, container) {
    container.innerHTML = "";
    let buses = busesData[campus];
    
    // Load saved schedules from localStorage
    const savedBuses = JSON.parse(localStorage.getItem("busSchedules")) || {};
    
    buses.forEach((bus, idx) => {
        // Merge with saved data if it exists
        const savedKey = `${campus}-${idx}`;
        const saved = savedBuses[savedKey];
        
        const displayBus = saved ? { ...bus, ...saved } : bus;
        const statusClass = displayBus.status === "available" ? "status-available" : "status-departed";
        const timeDisplay = displayBus.scheduledTime 
            ? `Leaving at ${convertTo12h(displayBus.scheduledTime)}`
            : displayBus.time;

        const card = document.createElement("div");
        card.className = "bus-card";

        card.innerHTML = `
            <h3>${displayBus.plate}</h3>
            <div class="bus-info">
                <p><strong>Type:</strong> ${displayBus.type.toUpperCase()} (${displayBus.seats} seats)</p>
                <p><strong>Destination:</strong> ${displayBus.destination}</p>
                <p><strong>Time:</strong> ${timeDisplay}</p>
                <p><strong>Status:</strong></p>
                <span class="bus-status ${statusClass}">${displayBus.status.toUpperCase()}</span>
            </div>
            <div class="bus-actions">
                <button class="bus-btn btn-toggle" onclick="openScheduleModal('${campus}', ${idx})">
                    Schedule Bus
                </button>
            </div>
        `;

        container.appendChild(card);
    });
}

function openScheduleModal(campus, busIdx) {
    currentAdmin = campus;
    editingBusIdx = busIdx;
    
    const busPlate = busesData[campus][busIdx].plate;
    document.getElementById("scheduleBusPlate").value = busPlate;
    document.getElementById("scheduleDay").value = "";
    document.getElementById("scheduleTime").innerHTML = '<option value="">-- Choose Time --</option>';
    document.getElementById("scheduleStatus").value = "available";
    
    document.getElementById("scheduleModal").style.display = "flex";
}

function closeScheduleModal() {
    document.getElementById("scheduleModal").style.display = "none";
    editingBusIdx = null;
}

function updateScheduleTimes() {
    const day = document.getElementById("scheduleDay").value;
    const timeSelect = document.getElementById("scheduleTime");
    
    timeSelect.innerHTML = '<option value="">-- Choose Time --</option>';
    
    if (day && BUS_SCHEDULE[day] && BUS_SCHEDULE[day].length > 0) {
        BUS_SCHEDULE[day].forEach(time => {
            const option = document.createElement("option");
            option.value = time;
            option.text = convertTo12h(time);
            timeSelect.appendChild(option);
        });
    } else {
        timeSelect.innerHTML = '<option value="">No buses scheduled this day</option>';
    }
}

function saveSchedule() {
    const day = document.getElementById("scheduleDay").value;
    const time = document.getElementById("scheduleTime").value;
    const status = document.getElementById("scheduleStatus").value;
    
    if (!day || !time) {
        alert("Please select a day and time.");
        return;
    }
    
    // Load existing schedules from localStorage
    let savedBuses = JSON.parse(localStorage.getItem("busSchedules")) || {};
    
    const saveKey = `${currentAdmin}-${editingBusIdx}`;
    savedBuses[saveKey] = {
        scheduledTime: time,
        status: status,
        day: day
    };
    
    localStorage.setItem("busSchedules", JSON.stringify(savedBuses));
    
    // Re-render the bus list
    const container = currentAdmin === "athi" ? document.getElementById("athiBuses") : document.getElementById("nairoiBuses");
    renderBusList(currentAdmin, container);
    
    closeScheduleModal();
    alert(`Bus scheduled successfully for ${convertTo12h(time)} on ${day.charAt(0).toUpperCase() + day.slice(1)}!`);
}

function toggleBusStatus(campus, busIdx) {
    const bus = busesData[campus][busIdx];
    bus.status = bus.status === "available" ? "departed" : "available";

    // Re-render the bus list
    const container = campus === "athi" ? document.getElementById("athiBuses") : document.getElementById("nairoiBuses");
    renderBusList(campus, container);
}

function adminLogout() {
    currentAdmin = null;
    localStorage.removeItem("adminCampus");
    document.getElementById("loginSection").classList.remove("hidden");
    document.getElementById("dashboardSection").classList.add("hidden");
    document.getElementById("campus").value = "";
    document.getElementById("password").value = "";
    document.getElementById("errorMsg").style.display = "none";
}

// Check if already logged in
window.addEventListener("DOMContentLoaded", () => {
    const savedCampus = localStorage.getItem("adminCampus");
    if (savedCampus) {
        currentAdmin = savedCampus;
        showDashboard();
    }
});

</script>

</body>
</html>
