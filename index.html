<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daystar Bus Booking</title>

<link rel="stylesheet" href="css/styles.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="welcome-container">

<div class="bus-icon">
<i class="fas fa-bus"></i>
</div>

<h1 class="welcome-title">Welcome.</h1>

<p class="welcome-text">
Daystar University Bus Booking System.<br>
Book your journey safely and conveniently.
</p>

<button class="start-btn" onclick="startBooking()">
Get Started <i class="fas fa-arrow-right"></i>
</button>

</div>


<!-- Bottom Navigation -->

<div class="bottom-nav">

<div class="nav-item active">
<i class="fas fa-home"></i>
<span>Home</span>
</div>

<div class="nav-item">
<i class="fas fa-location-dot"></i>
<span>Location</span>
</div>

<div class="nav-item">
<i class="fas fa-gear"></i>
<span>Settings</span>
</div>

<div class="nav-item" onclick="goToAdmin()">
<i class="fas fa-shield-halved"></i>
<span>Admin</span>
</div>

</div>

<script>

function startBooking(){
    window.location.href = "campus.html"
}

function goToAdmin(){
    window.location.href = "admin.html"
}

</script>

</body>
</html>
