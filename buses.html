<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Available Buses</title>

<style>

body{
font-family:Arial;
background:#0b1d35;
color:white;
margin:0;
padding:40px;
}

h1{
text-align:center;
margin-bottom:10px;
}

.trip-info{
text-align:center;
margin-bottom:40px;
color:#9ecbff;
}

.bus-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
max-width:900px;
margin:auto;
}

.bus-card{
background:white;
color:black;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.bus-card h3{
margin-top:0;
}

.seats{
margin:8px 0;
font-weight:bold;
}

button{
margin-top:10px;
padding:10px 18px;
border:none;
background:#2b8cff;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1c6ed5;
}

</style>

</head>

<body>

<h1>Available Buses</h1>

<div class="trip-info" id="tripInfo"></div>

<div class="bus-container" id="busContainer"></div>

<script>

/* -----------------------
   BUS DATABASE
----------------------- */

const buses=[

{plate:"KDE304E",campus:"nairobi",seats:47,layout:"3-2"},
{plate:"KDC405D",campus:"nairobi",seats:47,layout:"3-2"},
{plate:"KCE496V",campus:"nairobi",seats:47,layout:"3-2"},
{plate:"KDV450P",campus:"athi",seats:47,layout:"3-2"},

{plate:"KBC405R",campus:"athi",seats:29,layout:"2-2"},
{plate:"KDE690B",campus:"athi",seats:29,layout:"2-2"},
{plate:"KBA906C",campus:"nairobi",seats:29,layout:"2-2"},
{plate:"KCB297V",campus:"nairobi",seats:29,layout:"2-2"}

]

/* -----------------------
   READ USER SELECTION
----------------------- */

const campus=localStorage.getItem("selectedCampus")
const day=localStorage.getItem("selectedDay")
const time=localStorage.getItem("selectedTime")

document.getElementById("tripInfo").innerText=
campus+" campus | "+day+" | "+time

/* -----------------------
   FILTER BUSES
----------------------- */

const available=buses.filter(bus=>bus.campus===campus)

const container=document.getElementById("busContainer")

/* -----------------------
   DISPLAY BUSES
----------------------- */

available.forEach(bus=>{

const storageKey="bus_"+bus.plate
const bookedSeats=JSON.parse(localStorage.getItem(storageKey))||[]

const seatsLeft=bus.seats-bookedSeats.length

const card=document.createElement("div")
card.className="bus-card"

card.innerHTML=`

<h3>Bus ${bus.plate}</h3>

<p>Departure: ${time}</p>

<p class="seats">Seats left: ${seatsLeft}</p>

<button onclick="selectBus('${bus.plate}')">
Select Bus
</button>

`

container.appendChild(card)

})

/* -----------------------
   SELECT BUS
----------------------- */

function selectBus(plate){

localStorage.setItem("selectedBus",plate)

window.location.href="seat-selection.html"

}

</script>

</body>
</html>
