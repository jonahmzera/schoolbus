<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seat Selection</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0b1d35;
color:white;
display:flex;
flex-direction:column;
align-items:center;
padding:30px;
}

h1{
margin-bottom:5px;
}

.bus-plate{
margin-bottom:25px;
color:#9ecbff;
}

.bus{
background:white;
padding:25px;
border-radius:12px;
color:black;
}

.driver{
text-align:center;
font-weight:bold;
margin-bottom:15px;
}

.reserved{
display:flex;
justify-content:center;
gap:15px;
margin-bottom:20px;
}

.row{
display:flex;
gap:15px;
margin-bottom:10px;
justify-content:center;
}

.left{
display:flex;
gap:10px;
}

.right{
display:flex;
gap:10px;
}

.aisle{
width:30px;
}

.seat{
width:40px;
height:40px;
border-radius:6px;
display:flex;
align-items:center;
justify-content:center;
background:#dfe6ee;
cursor:pointer;
font-size:13px;
}

.seat:hover{
background:#b7c8db;
}

.selected{
background:#2b8cff;
color:white;
}

.booked{
background:#888;
cursor:not-allowed;
color:white;
}

.reserved-seat{
background:#f39c12;
color:white;
cursor:not-allowed;
}

.summary{
margin-top:25px;
text-align:center;
}

button{
margin-top:15px;
padding:12px 25px;
border:none;
border-radius:8px;
background:#2b8cff;
color:white;
font-size:16px;
cursor:pointer;
}

button:disabled{
background:#777;
cursor:not-allowed;
}

</style>
</head>

<body>

<h1>Select Your Seat</h1>
<div class="bus-plate" id="busPlate"></div>

<div class="bus">

<div class="driver">Driver</div>

<div class="reserved">
<div class="seat reserved-seat">R1</div>
<div class="seat reserved-seat">R2</div>
</div>

<div id="seatContainer"></div>

</div>

<div class="summary">
<p>Selected Seat: <span id="seatNumber">None</span></p>
<button id="continueBtn" disabled>Continue to Payment</button>
</div>

<script>

/* ---------------------------
   BUS DATA
--------------------------- */

const buses = {
"KDE304E":{seats:47,layout:"3-2"},
"KDC405D":{seats:47,layout:"3-2"},
"KCE496V":{seats:47,layout:"3-2"},
"KDV450P":{seats:47,layout:"3-2"},

"KBC405R":{seats:29,layout:"2-2"},
"KDE690B":{seats:29,layout:"2-2"},
"KBA906C":{seats:29,layout:"2-2"},
"KCB297V":{seats:29,layout:"2-2"}
}

/* ---------------------------
   LOAD BUS FROM STORAGE
--------------------------- */

const plate = localStorage.getItem("selectedBus") || "KDE304E"
document.getElementById("busPlate").innerText="Bus Plate: "+plate

const bus=buses[plate]

/* ---------------------------
   BOOKED SEATS
--------------------------- */

const storageKey="bus_"+plate
let bookedSeats=JSON.parse(localStorage.getItem(storageKey))||[]

/* ---------------------------
   GENERATE SEATS
--------------------------- */

const container=document.getElementById("seatContainer")

let seatCount=1
let selectedSeat=null

while(seatCount<=bus.seats){

const row=document.createElement("div")
row.className="row"

const left=document.createElement("div")
left.className="left"

const right=document.createElement("div")
right.className="right"

if(bus.layout==="3-2"){

for(let i=0;i<3;i++){
if(seatCount>bus.seats)break
left.appendChild(createSeat(seatCount))
seatCount++
}

for(let i=0;i<2;i++){
if(seatCount>bus.seats)break
right.appendChild(createSeat(seatCount))
seatCount++
}

}

else{

for(let i=0;i<2;i++){
if(seatCount>bus.seats)break
left.appendChild(createSeat(seatCount))
seatCount++
}

for(let i=0;i<2;i++){
if(seatCount>bus.seats)break
right.appendChild(createSeat(seatCount))
seatCount++
}

}

const aisle=document.createElement("div")
aisle.className="aisle"

row.appendChild(left)
row.appendChild(aisle)
row.appendChild(right)

container.appendChild(row)

}

/* ---------------------------
   CREATE SEAT
--------------------------- */

function createSeat(number){

const seat=document.createElement("div")
seat.className="seat"
seat.innerText=number

if(bookedSeats.includes(number)){

seat.classList.add("booked")

}

else{

seat.onclick=()=>{

if(selectedSeat){
selectedSeat.classList.remove("selected")
}

seat.classList.add("selected")
selectedSeat=seat

document.getElementById("seatNumber").innerText=number
document.getElementById("continueBtn").disabled=false

}

}

return seat

}

/* ---------------------------
   CONTINUE BUTTON
--------------------------- */

document.getElementById("continueBtn").onclick=()=>{

const seat=parseInt(selectedSeat.innerText)

bookedSeats.push(seat)

localStorage.setItem(storageKey,JSON.stringify(bookedSeats))
localStorage.setItem("selectedSeat",seat)

alert("Seat reserved!")

window.location.href="payment.html"

}

</script>

</body>
</html>
